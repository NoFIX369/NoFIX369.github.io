<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HARVEST</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; }

    /* Фон-слайдер */
    .bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        animation: slide 20s infinite;
        z-index: 1;
    }

    @keyframes slide {
        0%   { background-image: url('img1.jpg.jpg'); }
        25%  { background-image: url('img2.jpg.jpg'); }
        50%  { background-image: url('img3.jpg.jpg'); }
        75%  { background-image: url('img4.jpg.png'); }
        100% { background-image: url('img5.jpg.png'); }
    }

    /* Центр: логотип */
    .center {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 2;
    }

    .logo {
        width: 300px;
        filter: drop-shadow(0 0 20px #fff);
    }

    /* Видео снизу */
    .video-wrapper {
        position: fixed;
        bottom: 0; left: 0;
        width: 100%;
        z-index: 2;
        background: rgba(0,0,0,0.6);
    }

    .video {
        width: 100%;
        height: 30vh;
        object-fit: cover;
        display: block;
    }
</style>
</head>
<body>

<div class="bg"></div>

<div class="center">
    <img src="logo.png.png" class="logo">
</div>

<div class="video-wrapper">
    <video class="video" controls>
        <source src="video.mp4.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
