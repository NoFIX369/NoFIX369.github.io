<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HARVEST</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; min-height: 100%; background: #000; }

    /* Фон-слайдер */
    .bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        animation: slide 20s infinite;
        z-index: 1;
    }

    @keyframes slide {
        0%   { background-image: url('img1.jpg.jpg'); }
        25%  { background-image: url('img2.jpg.jpg'); }
        50%  { background-image: url('img3.jpg.jpg'); }
        75%  { background-image: url('img4.jpg.png'); }
        100% { background-image: url('img5.jpg.png'); }
    }

    /* Логотип в правом верхнем углу */
    .logo {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 600px; /* твой размер, не меняю */
        max-width: 40vw;
        z-index: 3;
        filter: drop-shadow(0 0 25px white);
    }

    /* Контент ниже — чтобы можно было листать */
    .content {
        position: relative;
        z-index: 4;
        margin-top: 100vh; /* чтобы видео было после фона */
        padding: 40px 0;
        background: #000;
    }

    /* Видео */
    .video {
        width: 100%;
        height: auto;
        display: block;
    }
</style>
</head>

<body>

<div class="bg"></div>

<img src="logo.png.png" class="logo">

<div class="content">
    <video class="video" controls>
        <source src="video.mp4.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
